      /* Kontainer marquee */
      .marquee {

        padding-left: 100%; /* mulai di luar layar kanan */

        text-shadow: 0 1px 2px rgba(0,0,0,0.6);
      }

      /* kalau mau teks lebih lambat/cepat ubah durasi di atas (12s) */
      @keyframes marquee {
        from {
          transform: translateX(0%); /* mulai dari kanan (karena padding-left:100%) */
        }
        to {
          transform: translateX(-100%); /* sampai teks bergeser sepenuhnya ke kiri */

      .nagaterbang {
        position: fixed;
        z-index: 1;
        left: 0;

        top: 0;
        bottom: 0;

      }

      .glow-on-hover {
        border: none;
        outline: none;
        color: #ff9100;
        background: #111;
        cursor: pointer;
        position: relative;
        z-index: 0;
        border-radius: 10px;
      }

      .glow-on-hover:before {
        content: '';
        background: linear-gradient(88deg, #ff0000, #000000, #ff0000, #000000, #ff0000, #000000, #ff0000, #000000);
        position: absolute;
        top: -2px;
        left: -2px;
        background-size: 400%;
        z-index: -1;
        filter: blur(5px);
        width: calc(100% + 4px);
        height: calc(100% + 4px);
        animation: glowing 20s linear infinite;
        opacity: 0;
        transition: opacity .3s ease-in-out;
        border-radius: 10px;
      }

      .glow-on-hover:before {
        opacity: 1;
      }

      .glow-on-hover:after {
        z-index: -1;
        content: '';
        position: absolute;
        width: 100%;
        height: 100%;
        background: #111;
        left: 0;
        top: 0;
        border-radius: 10px;
      }

      @keyframes glowing {
        0% {
          background-position: 0 0;
        }

        50% {
          background-position: 400% 0;
        }

        100% {
          background-position: 0 0;
        }
      }

      /* Responsive: atur duration lebih panjang di layar kecil agar terbaca */
      @media (max-width: 360px) {
        .marquee { animation-duration: 16s; font-size: 13px; }
      }
